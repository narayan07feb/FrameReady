name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Verify Library Compilation
      run: ./gradlew :frameready:assembleRelease --stacktrace
      
    - name: Run Library Unit Tests
      run: ./gradlew :frameready:testReleaseUnitTest --stacktrace
      
    - name: Verify Sample Compilation
      run: ./gradlew :sample-standard:assembleDebug --stacktrace
